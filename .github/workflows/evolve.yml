name: Daily evolution

on:
  schedule:
    - cron: "20 */6 * * *"
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    outputs:
      pushed: ${{ steps.push.outputs.pushed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install project dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Copilot CLI
        run: npm install -g @github/copilot@1.0.11

      - name: Install Playwright MCP + browsers
        run: |
          npm install -g @playwright/mcp@0.0.68
          npx playwright install chromium

      - name: Lock immutable files
        run: chmod 444 constitution/*

      - name: Configure git
        run: |
          git config user.name "Copilot"
          git config user.email "223556219+Copilot@users.noreply.github.com"

      - name: Run evolution session
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat constitution/AGENTS.md constitution/IDENTITY.md constitution/GOALS.md constitution/CONCEPTION.md JOURNAL.md BACKLOG.md data/ev-presence.json > /tmp/prompt.txt
          copilot \
            --model gpt-5.4 \
            --allow-all \
            --no-ask-user \
            --autopilot \
            --max-autopilot-continues 3 \
            --deny-tool 'shell(git push)' \
            --additional-mcp-config @.github/hooks/mcp-config.json \
            -p "@/tmp/prompt.txt"

      - name: Push if agent committed
        id: push
        run: |
          if git log origin/main..HEAD --oneline | grep -q .; then
            git push
            echo "pushed=true" >> $GITHUB_OUTPUT
          else
            echo "No new commits from agent. Nothing to push."
            echo "pushed=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: evolve
    if: needs.evolve.outputs.pushed == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/deploy.yml
